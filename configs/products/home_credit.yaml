name: home_credit

data:
  train_path: data/home_credit_wide.csv
  oot_path: null
  time_column: yyyymmdd        # synthesized from SK_ID_CURR rank, spans 2022-01-01 → 2024-12-31
  time_format: yyyymmdd
  label_column: TARGET
  id_columns: [SK_ID_CURR]
  treatment_column: null
  column_mapping: configs/products/home_credit_columns.csv

missing:
  # Aggregated Home Credit features are legitimately 0 (no events in window),
  # can be negative (DAYS_*), and empty when a customer has no records in a
  # table at all. Defaults of "0/neg/empty → missing + fill -999" are wrong —
  # override at the global level here.
  global:
    sentinels: []              # don't treat 0 as missing
    treat_negative_as_missing: false   # DAYS_* columns are negative by design
    treat_empty_as_missing: true       # actual null values are true missing
    # HC columns span both positive (amounts) and negative (DAYS_*) domains,
    # so no single constant can sit outside every observed range. Let XGBoost
    # handle NaN natively — it learns the missing branch at each split.
    fill_strategy: keep_nan
    analysis_use_mask: true
    generate_missing_indicator: false
    indicator_threshold: 0.10
    fill_value_sanity_check: true

feature_groups:
  # Home Credit engineered features use <table>_<col>_<agg>_<window> naming
  # with windows 30d/90d/180d/360d/all — matches the default window_pattern.
  #
  # Global nudge: short-window siblings that are within IV tolerance of their
  # long-window counterpart win; long windows take a small rank_score penalty.
  # Bureau and prev (long-dated by nature) opt out of the bias.
  family_policy:
    prefer: best_iv_short_bias
    window_penalty_gamma: 0.15
    coverage_bias_iv_tolerance: 0.02
  # Business-semantic groups across the engineered columns — every table
  # prefix becomes a declared group so the selector can curate them.
  # max_keep is left large (we are not trying to cut per group; we want
  # to SEE the group structure in the report).
  semantic_groups:
    # Prefix-based matching — every engineered column whose name starts with
    # <prefix> joins its group automatically. No need to enumerate features.
    # Bureau: long-dated credit-bureau records; long windows are genuinely
    # more informative here, so override back to best_iv.
    - {name: bureau,  description: 信用局 — 其他金融机构历史信贷记录, feature_prefix: "bureau_", max_keep: 100, prefer: best_iv, corr_cutoff_in_group: 0.90,
       family_policy: {prefer: best_iv, window_penalty_gamma: 0.0}}
    # Prev: prior applications span a customer's whole history — also long-dated.
    - {name: prev,    description: 历史贷款申请,                       feature_prefix: "prev_",   max_keep: 100, prefer: best_iv, corr_cutoff_in_group: 0.90,
       family_policy: {prefer: best_iv, window_penalty_gamma: 0.0}}
    # Instal / pos / cc: payment / POS / credit-card behaviour — recency matters.
    - {name: instal,  description: 分期还款历史,                       feature_prefix: "instal_", max_keep: 100, prefer: best_iv, corr_cutoff_in_group: 0.90}
    - {name: pos,     description: POS 现金贷款状态,                   feature_prefix: "pos_",    max_keep: 100, prefer: best_iv, corr_cutoff_in_group: 0.90}
    - {name: cc,      description: 信用卡余额历史,                     feature_prefix: "cc_",     max_keep: 100, prefer: best_iv, corr_cutoff_in_group: 0.90}

selected_features:
  active_version: v2_manual_noleak
  versions_dir: artifacts/home_credit/selected_features

analysis_overrides:
  iv_min: 0.005              # lower bar — HC features are weaker than UCI's duration
  corr_cutoff: 0.95
  per_feature_plot_top_n: 30 # keep plot generation bounded
  # HC features are ~85% zero/NaN. Equal-frequency quantiles on such features
  # produce one huge zero bin and many tiny non-zero bins whose IV/PSI become
  # noise-dominated. Tree-based binning (DecisionTreeClassifier leaves) learns
  # the informative splits directly and has min_samples_leaf baked in, so the
  # dominant "is_zero vs nonzero" break is picked up automatically.
  binning: tree
  # HC is sparse (~85% NaN/0), so univariate IV under-estimates features whose
  # signal lives in interactions (ratios, windowed deltas). Enable probing:
  # a cheap XGBoost on the CSR cache surfaces gain-based importance that
  # selector.py blends into rank_score. Build the cache first:
  #   PYTHONPATH=src python3 scripts/build_sparse_cache.py --product home_credit
  probing:
    enabled: true
    cache_dir: data/cache/home_credit   # explicit so manifests stay discoverable
    weight_in_rank_score: 0.25
    num_boost_round: 300
    early_stopping_rounds: 30

training_overrides:
  top_k_pct: 0.10
  final_feature_count: 200   # plan default — target deploy size
  hyperopt_max_evals: 2      # smoke test; bump to 20-50 for real runs
  # Tune on forward-chaining time folds so hyperparameters are selected
  # under the same regime as the time-based deployment split.
  cv_strategy: time_forward
  split:
    strategy: time           # exercise yyyymmdd-based time split end-to-end
    ratios: [0.70, 0.15, 0.15]
