name: xc_qual_finish
extends: xc_common

# QUALIFICATION model V1 (资质 V1). Target: is_credit_succ (授信成功:
# 1 -> 正样本, 0 -> 负样本), modeled on users who FINISHED THE TASK only
# (is_finish_task == 1). Table built by scripts/build_xc_dataset.py
# (data/xc_qual_finish.csv = rows where is_finish_task==1). is_finish_task is
# constant here; is_reg is analysis-only; the parallel credit outcome
# (is_credit_1v1 / raw credit_1v1) must never enter features — all parked in
# id_columns so the scanner excludes them. Pairs with xc_resp_finish (响应);
# fused score evaluated by run_funnel_eval.py.
#
# Shared xc settings (missing rules, screens, rank weights, training/export
# overrides) live in configs/families/xc_common.yaml.

data:
  train_path: data/xc_qual_finish.csv
  label_column: is_credit_succ
  id_columns: [id, is_reg, is_finish_task, is_credit_1v1, credit_1v1]

selected_features:
  versions_dir: artifacts/xc_qual_finish/selected_features
