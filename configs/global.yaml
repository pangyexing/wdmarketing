# wdmarketing global defaults. Products under configs/products/*.yaml override selected keys.
feature_groups:
  # (A) Time-window families: auto-detected by regex on feature names.
  #     Two schemas are accepted; products can override via deep merge.
  #     (a) legacy single-regex form (kept for back-compat):
  window_pattern: '^(?P<base>.+?)_(?P<window>7d|30d|90d|180d|360d|all|life|hist)$'
  #     (b) multi-pattern form (preferred — supports mixed naming conventions,
  #         e.g. xxx_7d / xxx_d7 / xxx_近7天 / xxx_last7days / xxx_1mon / xxx_1y):
  #       window_patterns:
  #         - preset: suffix_day          # references src/wdm/analysis/family.py:_WINDOW_PATTERN_PRESETS
  #         - preset: chinese_jin_days
  #         - pattern: '^(?P<base>.+?)_W(?P<window>\d+)$'   # inline custom
  #           alias_rule: "{window}d"
  #     Available presets: suffix_day, prefix_d, chinese_jin_days,
  #       english_last_days, number_only, suffix_mon, chinese_jin_months,
  #       english_last_months, suffix_mon_to_days, suffix_year,
  #       chinese_jin_years, english_last_years, suffix_year_to_days.
  window_order: [7d, 30d, 90d, 180d, 360d, all, life, hist]
  family_policy:
    max_per_family: 2
    # best_iv | shortest | longest | best_iv_short_bias
    # best_iv_short_bias: within coverage_bias_iv_tolerance of the family's best IV,
    # prefer shorter windows; outside tolerance, fall back to pure IV ordering.
    prefer: best_iv
    corr_cutoff_in_family: 0.90
    coverage_bias_iv_tolerance: 0.02   # tolerance (absolute IV) for best_iv_short_bias
    window_penalty_gamma: 0.0          # 0 disables window_penalty in rank_score; try 0.1~0.2
    window_penalty_table:              # canonical-window -> penalty; missing → linear fallback
      7d: 0.0
      30d: 0.0
      90d: 0.1
      180d: 0.2
      360d: 0.3
      all: 0.4
      life: 0.4
      hist: 0.4
  # Toggle the time-window (name-based) family clustering. Set false for datasets
  # whose features are plain numeric IDs with no time-window suffix (e.g. xc).
  enable_window_family: true
  # (B) Semantic groups: manually declared in product YAML. Empty here.
  semantic_groups: []
  # (C) Plain numerical correlation is handled by analysis/correlation.py union-find.

# Disabled placeholder — a future PR will implement Stage-2 materialization
# of derived features (delta / ratio / incremental / velocity) and predict.py
# replay. Stage-1 already reads this only to mark families as `already_configured`
# in family_derivation_candidates.csv; nothing else reads it yet.
feature_derivations:
  enabled: false
  default_keep_original: both         # both | replace | drop_original
  families: []                        # see src/wdm/analysis/family.py docstring for schema

missing:
  global:
    sentinels: [0]
    treat_negative_as_missing: true
    treat_empty_as_missing: true
    fill_strategy: constant      # constant | median | mean | zero | special | keep_nan
    fill_constant: -999
    analysis_use_mask: true      # analytics use NaN-aware, not post-fill values
    generate_missing_indicator: false
    indicator_threshold: 0.10
    fill_value_sanity_check: true

analysis:
  missing_rate_max: 0.95
  # PSI knobs. psi_cutoff stays at 0.25 for the informational threshold,
  # but psi_mode controls whether crossing it drops the feature.
  #   soft (default): PSI only dampens rank_score; feature stays in pool.
  #   hard          : legacy behavior — psi >= psi_cutoff drops the feature.
  #   off           : PSI ignored by selection; reported in CSV only.
  # Rationale: tree models often extract conditional signal from drifted
  # features; hard PSI cuts throw away usable information, especially for
  # synthesized/placeholder time columns where PSI is itself noisy.
  psi_cutoff: 0.25
  psi_mode: soft
  psi_penalty_weight: 0.25       # weight on z(psi) in rank_score (was effectively 1.0)
  # PSI expected/actual partition:
  #   halves        : earlier vs later half by median day (generic drift check)
  #   train_vs_rest : train split vs valid+oot per training.split — measures
  #                   the drift the model actually faces at deployment.
  #                   Recommended for time-split products.
  # Without a time column, PSI falls back to random halves and psi_mode is
  # forced to 'off' for the run (noise must not move rank_score).
  psi_partition: halves
  # Which rows fit the supervised Stage-1 stats (IV/WOE bins, Lift@K, Gini):
  #   train_only (default) : the training.split train rows only — valid/OOT
  #                          labels never influence feature selection.
  #   full                 : legacy behavior (all rows; leaks OOT labels into
  #                          selection — keep only for reproducing old runs).
  supervised_stats_split: train_only
  iv_min: 0.02
  corr_cutoff: 0.95
  n_bins: 10
  binning: equal_freq            # equal_freq | tree
  per_feature_plot_top_n: 50
  # Optional Stage-1 probing model. When enabled, a cheap XGBoost trains on
  # the sparse cache (see scripts/build_sparse_cache.py) and writes
  # probing_importance.csv into the report dir. selector.py merges
  # gain_rank_pct into rank_score so interaction-level signal (not captured
  # by univariate IV) can influence v1_auto.txt. Disabled by default:
  # products opt in via analysis_overrides.probing.enabled.
  probing:
    enabled: false
    cache_dir: null              # defaults to data/cache/<product>/
    weight_in_rank_score: 0.25   # 0 disables contribution even when enabled
    # Whether the probing model treats 0 as missing. Default true because
    # for sparse aggregated tables (home_credit) a 0 count carries the same
    # "no contribution" meaning as a NaN record — collapsing them gives
    # cleaner splits. Set to false to defer to missing.global.sentinels
    # (e.g. if a product legitimately has 0 as a signal the probing model
    # should learn from). This flag only affects probing; Stage 2 training
    # / deployment always follow missing.global.* unchanged.
    treat_zero_as_missing: true
    num_boost_round: 300
    early_stopping_rounds: 30
    xgb_params:
      objective: binary:logistic
      tree_method: hist
      eval_metric: aucpr
      max_depth: 6
      eta: 0.1
      subsample: 0.8
      # Column sampling is deliberately NOT set here: the code default is
      # colsample_bynode=0.8 (per-node resampling — better for high-dim
      # sparse inputs than per-tree; see probing.py _DEFAULT_XGB_PARAMS).
      # Setting colsample_bytree here would ADD to bynode, not replace it.
      min_child_weight: 1.0
      lambda: 1.0
      verbosity: 0
  # Short-window features (by window suffix) get a softer missing-rate cap:
  # "business didn't happen in the window" ≠ "data quality problem".
  short_windows: [7d, 30d]
  short_window_missing_rate_max: 0.98
  # PSI flag column thresholds (stable < shift < broken). Independent from
  # psi_cutoff (the hard filter) so products tuning psi_cutoff don't silently
  # change the flag labels.
  psi_flag_thresholds:
    shift: 0.10
    broken: 0.25
  # Correlation edges whose pairwise-complete overlap fraction is below this
  # are marked low_overlap and ignored by the selector's clustering.
  corr_min_overlap_frac: 0.10
  # Stage-1 v1_auto truncation cap; null -> fall back to
  # training.final_feature_count (legacy behavior). When the Stage-1.5 model
  # screen is enabled, set this LARGER than final_feature_count so the screen
  # has a real candidate pool to select from.
  stage1_top_n: null
  # Optional Stage-1.5 model-based screen (target-permutation null importance).
  # Off by default; run via scripts/run_model_screen.py (needs xgboost) or
  # scripts/run_analysis.py --model-screen. Writes selected_features/<out_version>.txt
  # derived from the Stage-1 v1_auto list.
  null_importance:
    enabled: false
    n_actual_runs: 3             # real-label trainings averaged into actual gain
    n_null_runs: 30              # shuffled-label trainings forming the null distribution
    n_boost_rounds: 100
    # Keep features whose actual gain exceeds this percentile of their own
    # null distribution. 95 keeps the screen honest (~5% of pure-noise
    # features pass by construction); the old default of 75 let ~25% of
    # noise through. Lower it only when the candidate pool is so small that
    # the screen must be lenient.
    keep_percentile: 95
    importance_type: gain
    max_features: null           # null -> training.final_feature_count
    out_version: v2_model
    xgb_params: {}               # overrides on top of training.xgb_base_params
  # Positive-oriented soft gate: when set, a feature with iv < iv_min is still
  # kept if its lift_at_k >= lift_keep_min (avoids dropping strong positive
  # rankers with weak IV). null = disabled (legacy behavior).
  lift_keep_min: null
  # Weights for the auto-keep rank_score. The psi weight is intentionally NOT
  # set here: when rank_weights.psi is absent the selector falls back to
  # analysis.psi_penalty_weight (0.25 above). Products may set rank_weights.psi
  # explicitly to override (psi_mode: off still zeroes it).
  rank_weights:
    iv: 1.0
    lift: 1.0
    gini: 1.0
    concentration: 0.0
    missing_penalty: 0.5
    missing_penalty_threshold: 0.5

training:
  top_k_pct: 0.10
  final_feature_count: 200
  # Two-stage feature funnel. When stage2_candidate_count is set and exceeds
  # final_feature_count, Stage-1 writes that many features into v1_auto.txt
  # (the candidate pool) and Stage-2 trains a cheap exploratory XGBoost to
  # re-rank by multivariate gain, then narrows to final_feature_count before
  # hyperopt + final training. Leave null (or ≤ final_feature_count) to skip
  # the funnel: Stage-1 emits final_feature_count and Stage-2 trains on it
  # directly (legacy behaviour).
  stage2_candidate_count: null
  stage2_pruning:
    # Ranking signal used to pick the final feature set. SHAP isn't an
    # option on every target machine, so we provide three SHAP-free upgrades
    # over single-seed gain. Trade-offs:
    #   gain                  — single XGB; cheapest; biased toward
    #                           high-cardinality / many-split features and
    #                           sensitive to the random seed.
    #   stability (default)   — n_seeds XGBs; mean rank-percentile of gain.
    #                           Same signal as gain but absorbs XGB
    #                           stochasticity (subsample/colsample). ~n_seeds×
    #                           the cost of "gain"; usually the right default.
    #   permutation           — single XGB; for each feature shuffle its
    #                           valid column n_permutation_repeats times and
    #                           average the PR-AUC drop. Closer to "does this
    #                           column actually move predictions". Cost is
    #                           ~n_features × n_permutation_repeats predict
    #                           passes on X_valid.
    #   permutation_stability — n_seeds × permutation. Most stable, slowest.
    #   shap                  — single XGB; mean(|TreeSHAP|) over a sampled
    #                           valid set. Usually the best signal *and*
    #                           faster than permutation when SHAP installs
    #                           cleanly. If SHAP import fails we fall back to
    #                           shap_fallback (default "stability") with a
    #                           warning. Set shap_fallback="raise" to fail
    #                           loud on machines where SHAP must work.
    #   shap_stability        — n_seeds × shap. Same fallback contract.
    ranking_method: shap
    n_seeds: 3                  # used by *_stability variants
    n_permutation_repeats: 3    # used by permutation / permutation_stability
    permutation_seed: 0
    # null = score on the full valid set (best fidelity). SHAP memory scales
    # ~n_samples × n_features × 8 bytes — set an explicit cap (e.g. 50000)
    # when valid is huge or candidates exceed a few thousand to avoid OOM.
    shap_sample_size: null
    shap_fallback: stability    # used only if ranking_method is shap*; "raise" to disable fallback
    # Defaults are deliberately cheap — this run exists only to rank, not
    # to fit. Bump rounds if the ranking looks unstable across seeds.
    num_boost_round: 200
    early_stopping_rounds: 30
    xgb_params:
      objective: binary:logistic
      tree_method: hist
      eval_metric: aucpr
      max_depth: 6
      eta: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 1.0
      lambda: 1.0
      verbosity: 0
  hyperopt_max_evals: 50
  cv_folds: 5
  random_seed: 42
  # Fraction of the valid split carved off as a dedicated calibration
  # holdout (the time-later tail for time splits). Early stopping / pruning
  # use the remaining valid half; isotonic calibration fits on the holdout —
  # never on the set that drove model selection. 0 restores the legacy
  # behavior (calibration fit on the full early-stopping valid set).
  calibration_split_fraction: 0.5
  eval_metrics: ["aucpr", "auc"]
  # Hyperopt selection metric: aucpr (full-curve, legacy) or precision_at_k
  # (custom feval at training.top_k_pct — matches the top-K deployment goal).
  tuner_objective: aucpr
  # CV fold construction for hyperopt: stratified (shuffled, legacy) or
  # time_forward (forward-chaining expanding-window folds on data.time_column —
  # use when split.strategy is time so tuning matches the deployment split).
  cv_strategy: stratified
  # Optional per-row training weights, e.g. business-value tiers:
  #   sample_weight: {column: credit_1v1, mapping: {3: 6.58, 2: 2.42, 1: 1.0}, default: 1.0}
  # Weights enter the training loss only; tuner selection (precision_at_k feval),
  # early stopping and all reported metrics stay unweighted (per-person).
  sample_weight: null
  xgb_base_params:
    objective: "binary:logistic"
    tree_method: "hist"
    verbosity: 1
  split:
    strategy: stratified         # stratified | time
    ratios: [0.70, 0.15, 0.15]
    # Purge gap (calendar days) after the train/valid and valid/oot cut days
    # for time splits: rows inside the gap belong to no split. Set to the
    # label's forward observation window so boundary rows' outcomes cannot
    # overlap the next split. 0 = disabled.
    embargo_days: 0

export:
  validation_sample_count: 100
  # Booster serialization formats to emit. json -> booster.json (text, readable),
  # bin/binary -> booster.bin (xgboost native binary). ubj -> booster.ubj (needs
  # xgboost >= 1.6). predict.py auto-detects whichever file is present.
  model_format: ["json"]
  # Per-model isotonic score calibration fit on the VALID split, exported as a
  # JSON lookup table (calibration.json) and replayed via np.interp in
  # predict.py. predict.py's `score` column stays RAW; the calibrated value is
  # an extra `score_calibrated` column — required when fusing scores across
  # models (raw probabilities are distorted differently by scale_pos_weight).
  calibration:
    enabled: true
    method: isotonic
    min_valid_rows: 200    # skip calibration (with a warning) below these
    min_valid_pos: 10

io:
  column_chunk_size: 50
  # Rows read for the column-dtype probe (wdm.io.column_scanner). A column
  # that looks int in the first N rows may still hold NaN/sentinels deeper in
  # the file; raise this if early-rows inference misleads a product.
  dtype_probe_rows: 10000
  # Stage-1 single-pass scan caches each column block as .npy so correlation
  # pass-2 never re-parses the CSV. Disk cost ≈ rows × features × 8 bytes;
  # point `dir` at a scratch disk for very wide datasets, or disable to fall
  # back to the (much slower) CSV-rereading correlation path.
  scan_cache:
    enabled: true
    dir: null                    # null -> artifacts/<product>/analysis/scan_cache/
    keep: false                  # keep cache dir after the run (debugging)
    mmap: true                   # np.load(mmap_mode='r') in pass-2 to cap peak memory

plots:
  dpi: 120
  format: png
