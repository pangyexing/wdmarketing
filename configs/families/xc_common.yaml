# Shared blocks for the xc product line (declared via `extends: xc_common`
# in configs/products/xc_*.yaml). Merge order: global.yaml → this file → the
# product YAML, so a product can still override any key below. Per-product
# files carry only: name, header comment, data.train_path / label_column /
# id_columns (+optional exclude_rows), selected_features.versions_dir, and
# the 1v1 variants' training_overrides.sample_weight.

data:
  oot_path: null
  time_column: dt                  # int yyyymmdd(特征/标签文件时间列均为 dt,合表时归一化)
  time_format: yyyymmdd
  treatment_column: null

missing:
  global:
    sentinels: []
    treat_negative_as_missing: false
    treat_empty_as_missing: true
    fill_strategy: keep_nan          # NA 不填充,直接保留 NaN 交给 XGBoost
    generate_missing_indicator: false

selected_features:
  # v2_model = the null-importance screen's output (the xc default path);
  # produced by run_analysis --model-screen. v1_auto trains on the raw
  # Stage-1 pool without the screen.
  active_version: v2_model

feature_groups:
  enable_window_family: false
  semantic_groups: []

training_overrides:
  final_feature_count: 200
  hyperopt_max_evals: 30
  tuner_objective: precision_at_k   # select hyperparams on P@10%, not full-curve PR-AUC
  cv_strategy: time_forward         # forward-chaining CV matching the time split
  split:
    strategy: time
    ratios: [0.70, 0.15, 0.15]

analysis_overrides:
  # 1000 维原始 → Stage-1 统计粗筛保留 ≤350 (v1_auto) → Stage-1.5 模型精筛 ≤200 (v2_model)
  stage1_top_n: 350
  null_importance:
    enabled: true                   # Stage-1.5:run_analysis.py 自动执行(需 xgboost,env36)
  iv_min: 0.01
  lift_keep_min: 1.2
  rank_weights:
    iv: 1.0
    lift: 1.5
    gini: 0.5
    concentration: 0.5
    psi: 0.5
    missing_penalty: 0.1
    missing_penalty_threshold: 0.7

export_overrides:
  model_format: ["json", "bin"]
